services:
  redis:
    image: redis:7-alpine
    container_name: feedback-redis
    ports:
      - "6379:6379"
    networks:
      - feedback-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: feedback-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postme
      POSTGRES_DB: feedbackdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - feedback-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedbackdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  vote-app:
    build:
      context: ../../apps/vote-app
      dockerfile: Dockerfile
    image: feedback-vote-app:local
    container_name: feedback-vote-app
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - feedback-network

  result-app:
    build:
      context: ../../apps/result-app
      dockerfile: Dockerfile
    image: feedback-result-app:local
    container_name: feedback-result-app
    environment:
      PORT: 4000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postme
      POSTGRES_DB: feedbackdb
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - feedback-network

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    image: feedback-worker:local
    container_name: feedback-worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postme
      POSTGRES_DB: feedbackdb
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - feedback-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  feedback-network:
    driver: bridge
